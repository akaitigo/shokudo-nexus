version: v2

managed:
  enabled: true

plugins:
  # 生成コードの再現性のためプラグインバージョンを固定する。
  # 更新時は `buf generate` を実行し backend/gen の差分をコミットすること（CIで検証される）。
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: backend/gen
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.6.1
    out: backend/gen
    opt: paths=source_relative

  - remote: buf.build/bufbuild/es:v2.12.1
    out: frontend/src/gen
    opt: target=ts
