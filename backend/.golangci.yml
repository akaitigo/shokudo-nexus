run:
  timeout: 5m
  go: "1.23"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - typecheck
    - gofumpt
    - goimports
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam

linters-settings:
  gofumpt:
    extra-rules: true
  goimports:
    local-prefixes: github.com/akaitigo/shokudo-nexus
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
